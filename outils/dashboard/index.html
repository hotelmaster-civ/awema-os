<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AWEMA · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_design/awema-ui.css">
<style>
:root{
  /* Dark (défaut) — deep navy + accents électriques */
  --bg:#191919; --bg2:#1F1F1F; --surface:rgba(255,255,255,.045); --surface-solid:#262626;
  --elev:rgba(255,255,255,.06); --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.13);
  --tx:#F0ECE1; --muted:#A59D89; --muted2:#7D7663;
  --blue:#FFC94D; --violet:#EDA914; --mint:#34E5C4; --gold:#D4AF37; --pink:#FF7D9C; --amber:#FFC861;
  --grad:linear-gradient(135deg,#FFC94D 0%,#EDA914 100%);
  --grad-mint:linear-gradient(135deg,#34E5C4,#FFC94D);
  --glass-blur:saturate(160%) blur(16px);
  --shadow:0 18px 50px -16px rgba(0,0,0,.65);
  --glow:0 0 0 1px var(--border), 0 8px 30px -10px rgba(255,201,77,.35);
  --r:20px; --r-sm:13px;
}
html[data-theme="light"]{
  --bg:#FAF6EC; --bg2:#F3EEDF; --surface:rgba(255,255,255,.72); --surface-solid:#FFFFFF;
  --elev:rgba(255,255,255,.9); --border:rgba(45,40,26,.09); --border2:rgba(45,40,26,.16);
  --tx:#262626; --muted:#7D7663; --muted2:#8D8672;
  --shadow:0 18px 44px -18px rgba(0,0,0,.28); --glow:0 0 0 1px var(--border),0 10px 30px -12px rgba(255,201,77,.30);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:
   radial-gradient(1100px 600px at 82% -8%,rgba(237,169,20,.16),transparent 60%),
   radial-gradient(900px 600px at 0% 0%,rgba(255,201,77,.14),transparent 55%),
   var(--bg);
  color:var(--tx);-webkit-font-smoothing:antialiased;overflow:hidden}
h1,h2,h3,.disp{font-family:'Plus Jakarta Sans','Inter',sans-serif;letter-spacing:-.02em}
button,input{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:20px}
a{color:inherit;text-decoration:none}

.app{display:grid;grid-template-columns:264px 1fr;height:100vh}

/* ---------- Sidebar ---------- */
.side{position:relative;display:flex;flex-direction:column;gap:6px;padding:18px 14px;
  background:var(--surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border-right:1px solid var(--border);min-height:0}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.logo{width:38px;height:38px;border-radius:12px;background:var(--grad);display:grid;place-items:center;
  font-family:'Plus Jakarta Sans';font-weight:800;color:#fff;box-shadow:0 8px 22px -6px rgba(237,169,20,.7)}
.brand b{font-family:'Plus Jakarta Sans';font-weight:800;font-size:16px;display:block;line-height:1.1}
.brand span{font-size:11px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:3px;overflow:auto}
.nav .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted2);margin:12px 10px 4px}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;color:var(--muted);
  font-size:13.5px;font-weight:500;transition:.18s;border:1px solid transparent}
.nav a svg{width:18px;height:18px;opacity:.9}
.nav a:hover{background:var(--elev);color:var(--tx)}
.nav a.active{color:var(--tx);background:linear-gradient(120deg,rgba(255,201,77,.16),rgba(237,169,20,.13));
  border-color:var(--border2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.nav a.active svg{color:var(--blue)}
.side .foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;
  background:var(--elev);border:1px solid var(--border)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--grad-mint);display:grid;place-items:center;
  font-weight:700;color:#04121a;font-size:13px}
.foot .who{font-size:12.5px;font-weight:600}.foot .who small{display:block;color:var(--muted);font-weight:400;font-size:11px}

/* ---------- Main ---------- */
.main{min-height:0;overflow:auto;padding:18px 24px 60px}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  padding:10px 0 16px;background:linear-gradient(var(--bg),rgba(7,11,20,0));backdrop-filter:blur(2px)}
.hamb{display:none;width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface);align-items:center;justify-content:center}
.title h1{font-size:21px;font-weight:800}
.title p{font-size:12.5px;color:var(--muted);margin-top:2px}
.spacer{flex:1}
.cmdk{display:flex;align-items:center;gap:10px;min-width:230px;padding:9px 13px;border-radius:13px;
  background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;transition:.18s}
.cmdk:hover{border-color:var(--border2)}
.cmdk kbd{margin-left:auto;font-family:inherit;font-size:11px;background:var(--elev);border:1px solid var(--border);
  border-radius:6px;padding:2px 7px;color:var(--tx)}
.iconbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  display:grid;place-items:center;cursor:pointer;transition:.18s}
.iconbtn:hover{border-color:var(--border2);transform:translateY(-1px)}
.iconbtn svg{width:18px;height:18px}
.cta{display:flex;align-items:center;gap:8px;padding:10px 15px;border-radius:12px;border:none;cursor:pointer;
  background:var(--grad);color:#fff;font-weight:600;font-size:13.5px;box-shadow:0 10px 24px -8px rgba(237,169,20,.6);transition:.18s}
.cta:hover{transform:translateY(-2px);box-shadow:0 16px 30px -10px rgba(237,169,20,.75)}

/* ---------- Bento grid ---------- */
.bento{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;grid-auto-rows:minmax(10px,auto)}
.card{position:relative;background:var(--surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);
  transition:transform .2s ease, border-color .2s}
.card:hover{transform:translateY(-3px);border-color:var(--border2)}
.card h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.card h3 svg{width:17px;height:17px;flex:0 0 auto;color:var(--muted)}
.card h3 .tag,.card h3 .badge{flex:0 0 auto}
.card .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.col3{grid-column:span 3}.col4{grid-column:span 4}.col5{grid-column:span 5}
.col6{grid-column:span 6}.col7{grid-column:span 7}.col8{grid-column:span 8}.col12{grid-column:span 12}

/* KPI */
.kpi .top{display:flex;justify-content:space-between;align-items:flex-start}
.kpi .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;border:1px solid var(--border)}
.kpi .ic svg{width:19px;height:19px}
.kpi .val{font-family:'Plus Jakarta Sans';font-weight:800;font-size:30px;margin-top:14px;letter-spacing:-.03em}
.kpi .lab{font-size:12.5px;color:var(--muted);margin-top:1px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.chip.up{color:#0a1a14;background:var(--mint)}.chip.down{color:#1a0a10;background:var(--pink)}
.kpi .spark{margin-top:12px}
.tag{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);
  border:1px solid color-mix(in srgb,var(--amber) 45%,transparent);padding:2px 7px;border-radius:7px}

/* legend + bars */
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:7px}
.legend span{font-size:12px;color:var(--muted)}.legend b{color:var(--tx);font-weight:600}
.bars{display:flex;flex-direction:column;gap:11px;margin-top:14px}
.bar{display:grid;grid-template-columns:120px 1fr 38px;align-items:center;gap:10px;font-size:12.5px}
.bar .tr{height:9px;border-radius:20px;background:var(--elev);overflow:hidden}
.bar .fl{height:100%;border-radius:20px;transform-origin:left;animation:grow .9s cubic-bezier(.2,.8,.2,1) both}
.bar .n{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
@keyframes grow{from{transform:scaleX(0)}}

/* funnel */
.funnel{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.fstep{display:flex;align-items:center;gap:12px}
.fstep .frow{flex:1;height:30px;border-radius:9px;background:var(--grad);display:flex;align-items:center;padding:0 12px;
  color:#fff;font-size:12px;font-weight:600;box-shadow:0 8px 20px -10px rgba(255,201,77,.5);animation:grow .9s both}
.fstep .v{width:54px;text-align:right;font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}

/* upcoming list */
.kpibox{background:var(--elev);border:1px solid var(--border);border-radius:14px;padding:12px 14px}
.kpibox .val2{font-family:'Plus Jakarta Sans';font-weight:800;font-size:22px;letter-spacing:-.02em}
.kpibox .lab{font-size:11px;color:var(--muted);margin-top:3px}
.list{margin-top:8px;display:flex;flex-direction:column}
.li{display:flex;gap:12px;align-items:center;padding:11px 6px;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.li .dt{font-size:11px;color:var(--muted);width:78px;font-variant-numeric:tabular-nums}
.li .t{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{font-size:10.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);white-space:nowrap}

/* scoring */
.score{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.sc{display:grid;grid-template-columns:26px 1fr 40px;align-items:center;gap:10px}
.sc .g{font-family:'Plus Jakarta Sans';font-weight:800;font-size:14px;text-align:center}
.donutWrap{display:flex;align-items:center;gap:18px;margin-top:8px}

/* automation status */
.auto{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.arow{display:flex;align-items:center;gap:10px;font-size:12.5px;padding:9px 11px;border-radius:11px;background:var(--elev);border:1px solid var(--border)}
.dot{width:8px;height:8px;border-radius:50%}
.ok{background:var(--mint);box-shadow:0 0 10px var(--mint)} .pend{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.arow .s{margin-left:auto;font-size:11px;color:var(--muted)}

/* progress ring */
.ring{display:grid;place-items:center}
.ring .pc{font-family:'Plus Jakarta Sans';font-weight:800;font-size:22px}

/* skeleton */
.sk{position:relative;overflow:hidden;background:var(--elev);border-radius:10px}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 1.25s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
.fade{animation:fade .5s ease both}@keyframes fade{from{opacity:0;transform:translateY(6px)}}

/* command palette */
.cmd-ov{position:fixed;inset:0;background:rgba(4,7,14,.55);backdrop-filter:blur(6px);z-index:80;display:none;align-items:flex-start;justify-content:center;padding-top:12vh}
.cmd-ov.on{display:flex}
.cmd{width:min(640px,92vw);background:var(--surface-solid);border:1px solid var(--border2);border-radius:18px;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.8);overflow:hidden;animation:pop .18s ease both}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(-8px)}}
.cmd .in{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid var(--border)}
.cmd input{flex:1;background:none;border:none;outline:none;font-size:16px}
.cmd .res{max-height:50vh;overflow:auto;padding:8px}
.cmd .r{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;cursor:pointer;font-size:13.5px}
.cmd .r.sel,.cmd .r:hover{background:var(--elev)}
.cmd .r .k{margin-left:auto;font-size:11px;color:var(--muted)}
.cmd .r small{color:var(--muted)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-solid);
  border:1px solid var(--border2);color:var(--tx);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:90;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;inset:0 auto 0 0;width:268px;z-index:60;transform:translateX(-100%);transition:.25s}
  .side.open{transform:none;box-shadow:0 0 80px rgba(0,0,0,.6)}
  .hamb{display:flex}
  .col3,.col4,.col5{grid-column:span 6}.col6,.col7,.col8{grid-column:span 12}
  .cmdk span{display:none}.cmdk{min-width:auto}
}
@media(max-width:560px){.col3,.col4,.col5,.col6{grid-column:span 12}.bar{grid-template-columns:92px 1fr 32px}}

/* Vue Contenus : champs + table */
.fld{background:var(--elev);border:1px solid var(--border);border-radius:10px;color:var(--tx);padding:9px 11px;font-size:13px;outline:none;transition:.16s}
.fld:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(255,201,77,.16)}
.ctable{margin-top:6px;font-size:12.5px}
.trow{display:grid;grid-template-columns:46px 104px 132px 56px 1fr 168px 40px;gap:10px;align-items:center;padding:9px 8px;border-bottom:1px solid var(--border)}
.trow.thead{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0;background:var(--surface-solid);z-index:1}
.trow .tt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{font-size:10.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);white-space:nowrap}
.kvr{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border);padding:7px 0}
.kvr b{color:var(--muted);font-weight:500}
@media(max-width:760px){.trow{grid-template-columns:40px 1fr 96px 34px}.trow span:nth-child(2),.trow span:nth-child(4){display:none}.trow span:nth-child(3){display:none}}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo" data-ag="initiales">A</div>
      <div><b data-ag="nom">AWEMA</b><span>Command Center</span></div>
    </div>
    <style>.nav a.soon{opacity:.62}.nav a em{margin-left:auto;font-style:normal;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--gold,#D4AF37);border:1px solid currentColor;border-radius:20px;padding:1px 6px;line-height:1.5}</style>
    <nav class="nav" id="nav">
      <div class="lbl">Pilotage</div>
      <a class="active" data-go="overview" data-ic="grid"><span>Vue d'ensemble</span></a>
      <a data-go="publier" data-ic="cal"><span>Planifier &amp; publier</span></a>
      <a data-go="calendrier" data-ic="cal"><span>Calendrier</span></a>
      <a data-go="contenus" data-ic="layers"><span>Contenus</span></a>
      <a data-go="memoire" data-ic="layers"><span>Mémoire</span></a>
      <a data-go="scoring" data-ic="chart"><span>Scoring</span></a>
      <a data-go="reseaux" data-ic="bubble"><span>Présence digitale</span></a>
      <a data-go="connecter" data-ic="bubble"><span>Connecter les réseaux</span></a>
      <div class="lbl">Conversion</div>
      <a class="soon" data-go="tunnel" data-ic="chat"><span>Tunnel WhatsApp</span><em>bientôt</em></a>
      <a class="soon" data-go="auto" data-ic="bolt"><span>Automatisation</span><em>bientôt</em></a>
      <div class="lbl">Agence</div>
      <a data-go="clients" data-ic="users"><span>Clients</span></a>
      <a data-go="reglages" data-ic="cog"><span>Réglages</span></a>
    </nav>
    <div class="foot">
      <div class="avatar" id="ava">CS</div>
      <div class="who" id="who">—<small>Directeur Marketing</small></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <header class="topbar">
      <button class="hamb" id="hamb" aria-label="Menu" data-ic="menu"></button>
      <div class="title">
        <h1 id="ptitle">Vue d'ensemble</h1>
        <p id="psub">Campagne — chargement…</p>
      </div>
      <select id="clientSel" class="fld" title="Client" style="max-width:210px"></select>
      <div id="fraich" style="display:flex;align-items:center;gap:6px"></div>
      <div class="spacer"></div>
      <button class="cmdk" id="cmdkBtn" data-ic="search"><span>Rechercher</span><kbd>⌘K</kbd></button>
      <button class="iconbtn" id="themeBtn" title="Thème" data-ic="moon"></button>
      <button class="cta" id="newBtn" data-ic="plus"><span>Nouveau contenu</span></button>
    </header>

    <section class="bento" id="grid" aria-live="polite"></section>
  </main>
</div>

<!-- Command palette -->
<div class="cmd-ov" id="cmdOv">
  <div class="cmd" role="dialog" aria-label="Recherche">
    <div class="in"><span data-ic="search" style="display:flex;color:var(--muted)"></span><input id="cmdIn" placeholder="Rechercher un contenu, une section…" autocomplete="off"><kbd style="font-size:11px;color:var(--muted)">esc</kbd></div>
    <div class="res" id="cmdRes"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="../_data/platforms.js" onerror=""></script>
<script src="../_data/agence.js" onerror="window.__noReg=1"></script>
<script src="../_data/config.js" onerror=""></script>
<script src="../_data/apply.js"></script>
<script src="../_design/awema-format.js"></script>
<script src="../_design/awema-github.js"></script>
<script src="../_design/awema-fork.js"></script>
<script src="../_design/awema-charts.js"></script>
<script src="data.js" onerror="window.__noData=1"></script>
<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const PLAT=window.AWEMA_PLATFORMS||{};
function pbadge(net,extra){const p=PLAT[net]||{c:'#FFC94D',grad:'var(--grad)',glyph:'•',nom:net};
  return `<span class="pi" style="width:24px;height:24px;border-radius:8px;display:inline-grid;place-items:center;
    color:#fff;font-weight:800;font-size:11px;font-family:'Plus Jakarta Sans';background:${p.grad}${extra||''}">${p.glyph}</span>`;}
function ic(n){const p={
  grid:'<rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/>',
  cal:'<rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/>',
  chart:'<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>',
  chat:'<path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>',
  bolt:'<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>',
  users:'<circle cx="9" cy="8" r="3.5"/><path d="M2.5 21a6.5 6.5 0 0 1 13 0M17 11a3 3 0 1 0-1-5.8M21.5 21a5.5 5.5 0 0 0-4-5.3"/>',
  cog:'<circle cx="12" cy="12" r="3.2"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2.3-1.3L13.8 2h-3.6l-.4 2.5a7 7 0 0 0-2.3 1.3l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.3l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2.3 1.3l.4 2.5h3.6l.4-2.5a7 7 0 0 0 2.3-1.3l2.3 1 2-3.4-2-1.5A7 7 0 0 0 19 12z"/>',
  menu:'<path d="M3 6h18M3 12h18M3 18h18"/>',search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',

/* Contenus « différés » : les grosses campagnes ne sont plus embarquées dans le registre
   (build.py, SEUIL_CAMPAGNE) — on charge alors le campagne.json source à la demande (servi par
   Pages), avec cache mémoire. Dégradation gracieuse : fetch impossible → liste vide, rien ne casse. */
const CAMP_CACHE={};
function chargerContenus(c){
  if(!c||!c.campagne) return Promise.resolve([]);
  const emb=c.campagne.contenus;
  if(emb&&emb.length) return Promise.resolve(emb);          // embarqué dans le registre (cas courant)
  if(!c.campagne.differe) return Promise.resolve([]);        // pas de campagne
  if(CAMP_CACHE[c.id]) return Promise.resolve(CAMP_CACHE[c.id]);
  const dir=c._dir||('modules/marketing/clients/'+(c.slug||c.id));
  return fetch('../../'+dir+'/_donnees/campagne.json').then(r=>r.ok?r.json():null)
    .then(d=>{const l=(d&&d.contenus)||[];CAMP_CACHE[c.id]=l;return l;}).catch(()=>[]);
}
function setClient(id){
  ACTIVE=CLIENTS.find(c=>c.id===id)||CLIENTS[0]||null;
  ITEMS=(ACTIVE&&ACTIVE.campagne&&ACTIVE.campagne.contenus)||[];
  RES=(ACTIVE&&ACTIVE.reseaux)||null;
  try{localStorage.setItem('awema-client',ACTIVE?ACTIVE.id:'');}catch(e){}
  const sel=$("#clientSel"); if(sel&&ACTIVE)sel.value=ACTIVE.id;
  aggregate(); refreshPsub(); go(CURRENT||'overview');
  if(ACTIVE&&ACTIVE.campagne&&ACTIVE.campagne.differe){
    const cible=ACTIVE.id;
    chargerContenus(ACTIVE).then(list=>{
      if(list.length&&ACTIVE&&ACTIVE.id===cible&&ITEMS.length!==list.length){
        ITEMS=list; aggregate(); refreshPsub(); go(CURRENT||'overview');
      }
    });
  }
}

/* ---------- charts ---------- */
function donut(data,size=132){
  const tot=data.reduce((s,d)=>s+d.v,0)||1,R=size/2,r=R-13,C=2*Math.PI*r;let off=0;
  const segs=data.map(d=>{const len=d.v/tot*C;const s=`<circle cx="${R}" cy="${R}" r="${r}" fill="none" stroke="${d.c}" stroke-width="14" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${R} ${R})" stroke-linecap="round" style="filter:drop-shadow(0 0 6px ${d.c}55)"/>`;off+=len;return s;}).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}
    <text x="${R}" y="${R-2}" text-anchor="middle" font-family="Plus Jakarta Sans" font-weight="800" font-size="26" fill="var(--tx)">${tot}</text>
    <text x="${R}" y="${R+16}" text-anchor="middle" font-size="10.5" fill="var(--muted)">contenus</text></svg>`;
}
/* courbe/spark/dfr : fournis par ../_design/awema-charts.js (module partagé, testé en CI) */
function area(map){
  const ks=Object.keys(map).map(Number).sort((a,b)=>a-b),vals=ks.map(k=>map[k]);
  const w=560,h=150,mx=Math.max(...vals,1);
  const pts=ks.map((k,i)=>[i/(ks.length-1||1)*w, h-12-(vals[i]/mx)*(h-30)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const fill=line+` L${w} ${h} L0 ${h} Z`;
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="var(--blue)"/>`).join('');
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="margin-top:14px;overflow:visible">
    <defs><linearGradient id="ar" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#FFC94D" stop-opacity=".4"/><stop offset="1" stop-color="#FFC94D" stop-opacity="0"/></linearGradient></defs>
    <path d="${fill}" fill="url(#ar)"/><path d="${line}" fill="none" stroke="url(#arl)" stroke-width="2.5"/>
    <linearGradient id="arl" x1="0" x2="1"><stop offset="0" stop-color="#FFC94D"/><stop offset="1" stop-color="#EDA914"/></linearGradient>${dots}</svg>`;
}
function ring(pct,size=104){const R=size/2,r=R-9,C=2*Math.PI*r,o=C*(1-pct/100);
  return `<div class="ring"><svg width="${size}" height="${size}"><circle cx="${R}" cy="${R}" r="${r}" fill="none" stroke="var(--elev)" stroke-width="9"/>
    <circle cx="${R}" cy="${R}" r="${r}" fill="none" stroke="url(#rg)" stroke-width="9" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${o}" transform="rotate(-90 ${R} ${R})"/>
    <defs><linearGradient id="rg" x1="0" x2="1"><stop offset="0" stop-color="#34E5C4"/><stop offset="1" stop-color="#FFC94D"/></linearGradient></defs></svg>
    <div class="pc" style="position:absolute">${pct}%</div></div>`;}

function countup(el,to,suf=''){let s=null,dur=900;const step=t=>{if(!s)s=t;const p=Math.min((t-s)/dur,1);
  el.textContent=Math.round(to*(1-Math.pow(1-p,3))).toLocaleString('fr-FR')+suf;if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);}

function calRender(){
  const w=$("#calWrap"); if(!w)return;
  const MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const y=CAL_REF.getFullYear(),m=CAL_REF.getMonth();
  const debut=(new Date(y,m,1).getDay()+6)%7, nb=new Date(y,m+1,0).getDate();   // Lun = colonne 0
  const p2=x=>(x<10?'0':'')+x, T=new Date(), tk=T.getFullYear()+'-'+p2(T.getMonth()+1)+'-'+p2(T.getDate());
  const ev={}, pousse=(k,e)=>{(ev[k]=ev[k]||[]).push(e);};
  ITEMS.forEach(it=>{ if(!it.date)return;
    pousse(it.date,{h:it.heure||'',t:it.titre||'',c:(PLAT[(it.plateforme||'').toLowerCase()]||{}).c||'#B3AA92'}); });
  currentPlanning().forEach(p=>{ if(!p.publier_le)return; const d=new Date(p.publier_le);

    const col=(AwemaFmt.DIFFUSION[p.statut]||{}).color||'#B3AA92';
    pousse(k,{h:p2(d.getHours())+':'+p2(d.getMinutes()),t:((p.contenu&&p.contenu.texte)||'(file)'),c:col}); });
  let cases='';
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(j=>cases+=`<div style="font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;padding:2px 6px">${j}</div>`);
  for(let i=0;i<debut;i++)cases+='<div></div>';
  for(let d=1;d<=nb;d++){
    const k=y+'-'+p2(m+1)+'-'+p2(d), l=ev[k]||[]; l.sort((a,b)=>(a.h||'').localeCompare(b.h||''));
    const puces=l.slice(0,3).map(e=>`<div title="${escP((e.h?e.h+' — ':'')+e.t)}" style="font-size:10.4px;color:var(--tx);background:${e.c}1c;border-left:2px solid ${e.c};border-radius:4px;padding:1px 5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escP((e.h?e.h+' ':'')+e.t)}</div>`).join('')
      +(l.length>3?`<div style="font-size:10px;color:var(--muted);margin-top:2px">+${l.length-3} autre(s)</div>`:'');
    cases+=`<div style="min-height:84px;border:1px solid ${k===tk?'#FFC94D88':'rgba(135,127,105,.22)'};border-radius:9px;padding:5px 6px;overflow:hidden;${k===tk?'background:rgba(255,201,77,.06)':''}">
      <div style="font-size:11px;font-weight:700;color:${k===tk?'#FFC94D':'var(--muted)'}">${d}</div>${puces}</div>`;
  }
  w.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="mini" onclick="calNav(-1)" aria-label="Mois précédent">←</button>
      <b style="font-size:14.5px;min-width:148px;text-align:center;text-transform:capitalize">${MOIS[m]} ${y}</b>
      <button class="mini" onclick="calNav(1)" aria-label="Mois suivant">→</button>
      <button class="mini gold" onclick="calNav(0)">Aujourd'hui</button>
      <span style="margin-left:auto;font-size:11px;color:var(--muted)">file :
        <span style="color:#D4AF37">■ programmé</span> · <span style="color:#34E5C4">■ publié</span> · <span style="color:#FF7D9C">■ échec</span></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px">${cases}</div>`;
}

/* ---------- Scoring A→E : RÉEL et pédagogique ----------
   Principe : chaque post gagne des points d'engagement (like=1, commentaire=2, partage=3 —
   un commentaire ou un partage demande plus d'effort qu'un like). On compare ensuite chaque
   post à la MOYENNE DU CLIENT (jamais à un standard externe) : le ratio donne la note. */
const SCORE_NOTES=[
  {n:'A',min:2,   c:'#34E5C4',dec:'À reproduire',   exp:'≥ 2× ta moyenne — refais ce format/sujet'},
  {n:'B',min:1.25,c:'#FFC94D',dec:'À amplifier',    exp:'1,25–2× — bon filon, pousse-le (fréquence, pub)'},
  {n:'C',min:.75, c:'#FFC861',dec:'Dans la moyenne',exp:'0,75–1,25× — correct, teste des variantes'},
  {n:'D',min:.35, c:'#FF9F45',dec:'Surveiller',     exp:'0,35–0,75× — sous la moyenne, comprends pourquoi'},
  {n:'E',min:0,   c:'#FF7D9C',dec:'À abandonner',   exp:'< 0,35× — arrête ce format, réalloue l\'effort'}];
function scorePts(t){return (t.likes||0)+2*(t.commentaires||0)+3*(t.partages||0);}
function scoreNote(ratio){return SCORE_NOTES.find(x=>ratio>=x.min)||SCORE_NOTES[SCORE_NOTES.length-1];}
function viewScoring(){
  const tops=(RES&&RES.top_posts)||[];
  add(`<h3>${ic('target')} Comment marche le scoring</h3>
    <div class="sub">Trois étapes, aucune boîte noire — calculé sur les posts réels de la dernière synchro</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px">
      <div class="kpibox" style="text-align:left;padding:14px">
        <b style="color:var(--gold,#D4AF37)">① Des points d'engagement</b>
        <div style="font-size:12.4px;color:var(--muted);margin-top:6px;line-height:1.65">
          Chaque post gagne : <b style="color:var(--tx)">1 pt</b> par like ·
          <b style="color:var(--tx)">2 pts</b> par commentaire ·
          <b style="color:var(--tx)">3 pts</b> par partage.<br>
          Commenter ou partager demande plus d'effort qu'un like → ça pèse plus.</div></div>
      <div class="kpibox" style="text-align:left;padding:14px">
        <b style="color:var(--gold,#D4AF37)">② Comparé à TA moyenne</b>
        <div style="font-size:12.4px;color:var(--muted);margin-top:6px;line-height:1.65">
          On divise les points du post par la moyenne des posts <b style="color:var(--tx)">de ce client</b>
          (jamais un standard externe). Ratio 2 = deux fois mieux que d'habitude.</div></div>
      <div class="kpibox" style="text-align:left;padding:14px">
        <b style="color:var(--gold,#D4AF37)">③ Une note = une décision</b>
        <div style="font-size:12.4px;color:var(--muted);margin-top:6px;line-height:1.65">
          A à E selon le ratio. La note ne juge pas le post : elle te dit
          <b style="color:var(--tx)">quoi faire ensuite</b> — reproduire, amplifier, tester, abandonner.</div></div>
    </div>`,'col12');
  if(!tops.length){
    add(`<h3>${ic('chart')} Scores de ${escP(ACTIVE?ACTIVE.nom:'—')}</h3>
      <div class="sub">Aucun post analysé pour l'instant</div>
      <div style="margin-top:12px;font-size:12.6px;color:var(--muted);line-height:1.7">Les scores apparaissent dès que
        les réseaux sont connectés et synchronisés : chaque synchro récupère les posts récents et leurs réactions réelles.</div>
      <div style="margin-top:12px"><button class="mini gold" onclick="go('connecter')">Connecter les réseaux →</button></div>`,'col12');
    return;
  }
  const rows=tops.map(t=>({t,pts:scorePts(t)}));
  const moy=rows.reduce((s,r)=>s+r.pts,0)/rows.length||1;
  rows.forEach(r=>{r.ratio=r.pts/(moy||1);r.note=scoreNote(r.ratio);});
  rows.sort((a,b)=>b.pts-a.pts);
  add(`<h3>${ic('chart')} Scores réels — ${escP(ACTIVE.nom)}
      <span class="pill" style="margin-left:auto">moyenne : ${moy.toFixed(1).replace('.',',')} pts/post</span></h3>
    <div class="sub">Les ${rows.length} posts récents analysés par la synchro (points = likes + 2×comm. + 3×partages)</div>

function derniereSync(){ let mx=null;
  // Le client DÉMO est exclu : une nouvelle agence ne doit pas voir « données il y a 6 j »
  // (ni un bouton Synchroniser inutile) avant d'avoir connecté son premier vrai réseau.
  CLIENTS.forEach(c=>{ if((c.statut||'')==='demo')return;
    const m=c.reseaux&&c.reseaux.maj; if(m&&(!mx||m>mx))mx=m;});
  return mx; }
function majFraicheur(){
  const el=$("#fraich"); if(!el)return;
  const iso=derniereSync();
  if(!iso){el.innerHTML='';return;}
  const h=(Date.now()-new Date(iso))/36e5;
  const rel=h<1?'il y a '+Math.max(1,Math.round(h*60))+' min':h<48?'il y a '+Math.round(h)+' h':'il y a '+Math.round(h/24)+' j';
  const vieux=h>24;
  el.innerHTML=`<span class="pill" title="Dernière récupération des données réseaux : ${new Date(iso).toLocaleString()}"
      style="white-space:nowrap;border-color:${vieux?'#FFC94D66':'var(--border)'};color:${vieux?'#FFC94D':'var(--muted)'}">📡 Données : ${rel}</span>`+
    (vieux?`<button class="mini gold" id="fraichBtn" style="white-space:nowrap">🔄 Synchroniser</button><span id="fraichMsg" style="font-size:11.5px;color:var(--muted)"></span>`:'');

window.planUse=function(pid){
  const it=ITEMS.find(x=>String(x.id)===String(pid)); if(!it)return;
  const texte=[(it.legende||it.hook||it.titre||'').trim(),(it.hashtags||'').trim()].filter(Boolean).join('\n\n');
  go('publier',{focus:'#pubTexte'});

    if(dd)dd.value=(it.date&&it.date>=auj)?it.date:auj;   // jamais une date passée

function pubProgrammer(){
  if(!window.AwemaGH){pubMsg('Module GitHub indisponible.','#FF7D9C');return;}
  const reseaux=$$("#pubNets input:checked").map(i=>i.value);
  if(!reseaux.length){pubMsg('Choisis au moins un réseau.','#FF7D9C');return;}
  const texte=$("#pubTexte").value.trim(); if(!texte){pubMsg('Écris le texte du post.','#FF7D9C');return;}
  const date=$("#pubDate").value,time=$("#pubTime").value||'09:00';
  if(!date){pubMsg('Choisis une date.','#FF7D9C');return;}
  const dt=new Date(date+'T'+time); if(isNaN(dt)){pubMsg('Date/heure invalide.','#FF7D9C');return;}
  const slug=ACTIVE.slug||ACTIVE.id,dir=ACTIVE._dir||('modules/marketing/clients/'+slug);
  const id='p-'+date.replace(/-/g,'')+'-'+time.replace(':','')+'-'+Math.random().toString(36).slice(2,8);
  const media=[],img=$("#pubImg").value.trim(); if(img)media.push({type:'image',url:img});
  // Source réelle : ia-creatif seulement si le texte porte encore l'accroche de la proposition
  // (si l'humain a tout réécrit, c'est redevenu du manuel — on ne triche pas les stats).
  let source='manuel',lien_plan=null,lien_prop=null;
  if(PUB_SRC&&PUB_SRC.type==='plan'){source='plan';lien_plan=PUB_SRC.plan_id;}
  else if(PUB_SRC&&PUB_SRC.type==='ia-creatif'&&PUB_SRC.hook&&texte.includes(PUB_SRC.hook.slice(0,30))){
    source='ia-creatif';lien_prop={hook:PUB_SRC.hook,genere_le:PUB_SRC.genere_le};}
  const item={id:id,client:slug,reseaux:reseaux,publier_le:dt.toISOString(),contenu:{texte:texte,lien:''},media:media,comptes:comptesPub(ACTIVE),statut:'programme',source:source,resultats:{},tentatives:0,cree_le:new Date().toISOString()};
  if(lien_plan!=null)item.plan_id=lien_plan;
  if(lien_prop)item.proposition=lien_prop;
  pubMsg('Connexion à GitHub…');
  AwemaGH.ensure(function(){ pubMsg('Enregistrement dans la file d\'attente…');
    AwemaGH.saveFile(dir+'/_donnees/_planning/'+id+'.json',item,'AWEMA : planifie '+id).then(function(){
      AwemaGH.runWorkflow('build.yml'); PLANNED_LOCAL.unshift(item); PUB_SRC=null;
      pubMsg('✅ Programmé pour '+dt.toLocaleString()+' — visible dans le calendrier ci-dessous.','#34E5C4');
      refreshPsub(); go('publier');
    }).catch(function(e){pubMsg('❌ '+(e.message||e),'#FF7D9C');});
  });
}
function pubGenerer(){
  if(!window.AwemaGH){$("#pubGenMsg").textContent='Module GitHub indisponible.';return;}
  const slug=ACTIVE.slug||ACTIVE.id,idee=($("#pubIdee").value||'').trim(),gm=$("#pubGenMsg");
  gm.style.color='var(--muted)'; gm.textContent='Connexion à GitHub…';
  AwemaGH.ensure(function(){ $("#pubGen").disabled=true; gm.textContent='Lancement de l\'IA…';
    AwemaGH.latestRun('proposals.yml').then(function(prev){const base=prev&&prev.id;
      return AwemaGH.runWorkflow('proposals.yml',{client:slug,idee:idee},true).then(function(){gm.textContent='⏳ Génération (~1 min)…';pubPoll(base,0);});
    }).catch(function(e){$("#pubGen").disabled=false;gm.style.color='#FF7D9C';gm.textContent='❌ '+(e.message||e);});
  });
}
function pubPoll(base,tries){const gm=$("#pubGenMsg");
  if(tries>24){gm.textContent='⏳ Toujours en cours. Reviens dans une minute.';$("#pubGen").disabled=false;return;}
  setTimeout(function(){ AwemaGH.latestRun('proposals.yml').then(function(run){
    if(!run||run.id===base){pubPoll(base,tries+1);return;}
    if(run.status!=='completed'){pubPoll(base,tries+1);return;}
    if(run.conclusion==='success'){gm.style.color='var(--mint)';gm.textContent='✅ Généré ! Récupération…';pubAfterGen(0);}
    else{gm.style.color='#FF7D9C';gm.innerHTML='❌ Échec — <a href="'+(run.url||'#')+'" target="_blank" style="color:var(--gold)">voir le détail</a>.';$("#pubGen").disabled=false;}
  }).catch(function(){pubPoll(base,tries+1);}); },3000);
}
function pubAfterGen(tries){ dashRefetch().then(function(){const cr=loadAgent(ACTIVE,'creatif'),n=((cr&&cr.items)||[]).length;
    if(n>0||tries>=8){$("#pubGen").disabled=false;refreshPsub();go('publier');} else setTimeout(function(){pubAfterGen(tries+1);},4000);
  }).catch(function(){if(tries<8)setTimeout(function(){pubAfterGen(tries+1);},4000);else{$("#pubGen").disabled=false;refreshPsub();go('publier');}}); }

/* — état + helpers du formulaire mémoire — */
const MEM_L={persona:[],produit:[],faq:[]};
function memRender(k){
  const cont=$("#memL-"+k); if(!cont)return;
  const ph={persona:['Nom du persona','Besoin / objection'],produit:['Produit / service','Description courte'],faq:['Question','Réponse']}[k];
  const fk={persona:['nom','besoin'],produit:['nom','description'],faq:['q','r']}[k];
  cont.innerHTML=MEM_L[k].map((v,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px">
    <input class="fld" style="flex:1;font-size:12.5px" value="${escAttr(v[fk[0]])}" placeholder="${ph[0]}" oninput="MEM_L['${k}'][${i}]['${fk[0]}']=this.value">
    <input class="fld" style="flex:1.4;font-size:12.5px" value="${escAttr(v[fk[1]])}" placeholder="${ph[1]}" oninput="MEM_L['${k}'][${i}]['${fk[1]}']=this.value">
    <button class="mini" onclick="memRm('${k}',${i})" title="Supprimer">✕</button></div>`).join('')
    ||'<div style="font-size:11.5px;color:var(--muted)">Aucun élément — « + Ajouter ».</div>';
}
window.memAdd=function(k){MEM_L[k].push(k==='faq'?{q:'',r:''}:(k==='persona'?{nom:'',besoin:''}:{nom:'',description:''}));memRender(k);};
window.memRm=function(k,i){MEM_L[k].splice(i,1);memRender(k);};
function memObj(){
  const F=i=>(($("#"+i)||{}).value||'').trim();
  const prev=ACTIVE.memoire||{};
  return {
    identite:{mission:F('memMission'),proposition_valeur:F('memProp'),cible:F('memCible'),secteur:F('memSecteur')},
    ton:F('memTon'),
    charte:{couleurs:(prev.charte||{}).couleurs||[],polices:(prev.charte||{}).polices||[],
      mots_cles:F('memMots')?F('memMots').split(',').map(s=>s.trim()).filter(Boolean):[]},
    personas:MEM_L.persona.filter(p=>p.nom),
    produits:MEM_L.produit.filter(p=>p.nom),
    faq:MEM_L.faq.filter(p=>p.q),
    campagnes:prev.campagnes||[],performances_synthese:prev.performances_synthese||"",
    references_visuelles:prev.references_visuelles||[]
  };
}

   quoi:'Abonnés de ta Page entreprise + publication programmée (texte & image).',
   comment:'« Se connecter avec LinkedIn » (OAuth) — l\'échange se fait dans une Action GitHub.'},
  {id:'whatsapp', nom:'WhatsApp Business', page:'connect-whatsapp.html', nets:[],
   quoi:'Messagerie client (tunnel de conversion — post-bêta).',
   comment:'Tokens WhatsApp Cloud API (Secrets) — guide pas-à-pas.'},
  {id:'ia', nom:'IA — le cerveau', page:'connect-ia.html', nets:[],
   quoi:'Analyste, Stratège, Créatif, Rétrospective : les agents qui travaillent pour toi.',
   comment:'Une clé gratuite (Groq) suffit — à coller dans Réglages, sans quitter le dashboard.'}
];
function cxStats(nets){
  let n=0,aud=0;
  CLIENTS.forEach(c=>{
    const pr=c.reseaux&&c.reseaux.par_reseau; if(!pr)return;
    const on=nets.some(k=>{const v=pr[k];return v&&((v.abonnes||0)>0||(v.posts||0)>0);});
    if(on){n++;nets.forEach(k=>{aud+=(pr[k]&&pr[k].abonnes)||0;});}
  });
  return {n,aud};
}
function viewConnecter(){
  const iso=derniereSync();
  add(`<h3>${ic('bubble')} Connecter les réseaux</h3>
    <div class="sub">Chaque réseau connecté = données réelles fraîches chaque semaine. Les guides s'ouvrent en pleine page.</div>
    ${iso?`<div style="margin-top:10px;font-size:12.5px;color:var(--muted)">📡 Dernière récupération : <b style="color:var(--tx)">${new Date(iso).toLocaleString()}</b> (${tempsRel(iso)})
      <button class="mini gold" style="margin-left:8px" onclick="lancerSync($('#cxSyncMsg'))">🔄 Synchroniser maintenant</button>
      <span id="cxSyncMsg" style="margin-left:6px"></span></div>`:''}`,'col12');
  RX_CX.forEach(r=>{
    const p=PLAT[r.id]||{c:'#FFC94D',grad:'var(--grad)'};
    const st=r.nets.length?cxStats(r.nets):null;
    const ok=st&&st.n>0;
    add(`<div style="display:flex;align-items:center;gap:10px">
        <div style="flex:0 0 auto">${PLAT[r.id]?pbadge(r.id):`<div class="ic" style="color:${p.c};background:${p.c}1a;border-color:${p.c}40">${ic(r.id==='ia'?'spark':'chat')}</div>`}</div>
        <h3 style="margin:0">${r.nom}</h3>
        ${st?`<span class="pill" style="margin-left:auto;border-color:${ok?'#34E5C4':'#B3AA92'}55;color:${ok?'#34E5C4':'var(--muted)'}">${ok?st.n+' client'+(st.n>1?'s':'')+' ✓':'à connecter'}</span>`
            :`<span class="pill" style="margin-left:auto">${r.id==='ia'?'cerveau':'messagerie'}</span>`}
      </div>
      ${ok?`<div style="margin-top:8px;font-size:12.5px;color:var(--muted)">Audience suivie : <b style="color:var(--tx)">${nf(st.aud)}</b> abonnés</div>`:''}
      <div style="margin-top:10px;font-size:12.6px;line-height:1.6"><b style="color:${p.c}">Ce que ça apporte.</b> ${r.quoi}</div>
      <div style="margin-top:6px;font-size:12.2px;color:var(--muted);line-height:1.6"><b>Comment.</b> ${r.comment}</div>
      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        ${r.id==='ia'?`<button class="mini gold" onclick="go('reglages',{focus:'#rIaKey'})">⚡ Brancher l'IA ici →</button>`:''}
        <a class="mini${r.id==='ia'?'':' gold'}" href="../../${r.page}" target="_blank" rel="noopener" style="text-decoration:none">${ok?'Guide / ajouter':'Connecter'} ↗</a>
      </div>`,'col4');
  });
}
/* ---------- Routeur de vues ---------- */
const SECTIONS={overview:["Vue d'ensemble",viewOverview],publier:["Planifier & publier",viewPublier],memoire:["Mémoire Marketing",viewMemoire],connecter:["Connecter les réseaux",viewConnecter],calendrier:["Calendrier éditorial",viewCalendrier],
  contenus:["Contenus",viewContenus],reseaux:["Présence digitale",viewReseaux],scoring:["Scoring A→E",viewScoring],
  tunnel:["Tunnel WhatsApp",viewTunnel],auto:["Automatisation",viewAuto],clients:["Clients & présence digitale",viewClients],
  reglages:["Réglages",viewReglages]};
// Vues volontairement masquées en « bientôt » jusqu'à finition post-bêta (qualité > quantité).
const BIENTOT=new Set(['tunnel','auto']);
function viewBientot(titre){
  add(`<div style="text-align:center;padding:30px 16px">
    <div style="font-size:40px;line-height:1">🚧</div>
    <h3 style="margin-top:12px">${titre} — <span style="color:var(--gold,#D4AF37)">bientôt</span></h3>
    <div class="sub" style="margin-top:8px">Cette vue arrive après la bêta. On préfère livrer peu de
      fonctionnalités, extrêmement bien finies, sur des données réelles.</div>
    <div style="margin-top:14px;font-size:12.5px;color:var(--muted)">En attendant : la
      <b>Vue d'ensemble</b>, la <b>Présence digitale</b> et les <b>Assistants IA</b> sont prêts.</div>
  </div>`,'col12');
}
let CURRENT='overview';
function skeleton(){
  const g=$("#grid");g.innerHTML='';
  ['col3','col3','col3','col3','col4','col4','col4','col8','col4'].forEach(s=>{const c=card(s);
    c.innerHTML=`<div class="sk" style="height:14px;width:50%"></div><div class="sk" style="height:${s==='col8'?120:90}px;margin-top:16px"></div>`;g.appendChild(c);});
}
function go(section,opts){
  if(!SECTIONS[section])section='overview';
  CURRENT=section;
  $$('#nav a').forEach(x=>x.classList.toggle('active',x.dataset.go===section));
  $("#ptitle").textContent=SECTIONS[section][0];
  $("#side").classList.remove('open');
  skeleton();
  setTimeout(()=>{$("#grid").innerHTML='';
    if(BIENTOT.has(section)){viewBientot(SECTIONS[section][0]);}else{SECTIONS[section][1]();}
    if(opts&&opts.focus)focusCard(opts.focus);},240);
}
// Guide l'œil après un go() : scrolle jusqu'à l'élément visé, surligne sa carte, focus le champ.
// (Sans ça, les boutons « Générer / Planifier » donnaient l'impression d'un simple rechargement.)
function focusCard(sel){
  const el=$(sel); if(!el)return;
  const carte=el.closest('.card')||el;
  carte.scrollIntoView({behavior:'smooth',block:'center'});
  carte.style.transition='box-shadow .35s';
  carte.style.boxShadow='0 0 0 2px #FFC94D, 0 0 24px -6px rgba(255,201,77,.45)';
  setTimeout(()=>{carte.style.boxShadow='';},1800);
  if(typeof el.focus==='function')try{el.focus({preventScroll:true});}catch(e){}
}

/* ---------- Command palette ---------- */
const NAVITEMS=[['overview','Vue d\'ensemble'],['publier','Planifier & publier'],['calendrier','Calendrier'],['contenus','Contenus'],['memoire','Mémoire Marketing'],['connecter','Connecter les réseaux'],['reseaux','Présence digitale'],['scoring','Scoring A→E'],['tunnel','Tunnel WhatsApp (bientôt)'],['auto','Automatisation (bientôt)'],['clients','Clients'],['reglages','Réglages']];
function openCmd(){$("#cmdOv").classList.add('on');$("#cmdIn").value='';$("#cmdIn").focus();cmdRender('');}
function closeCmd(){$("#cmdOv").classList.remove('on');}
let cmdSel=0,cmdList=[];
function cmdRender(q){
  q=q.toLowerCase();
  const navHits=NAVITEMS.filter(n=>n[1].toLowerCase().includes(q)).map(n=>({t:n[1],s:'Section',go:n[0]}));
  const itemHits=ITEMS.filter(it=>it.titre.toLowerCase().includes(q)).slice(0,7).map(it=>({t:it.titre,s:it.plateforme+' · '+it.pilier,titre:it.titre}));
  cmdList=[...navHits,...itemHits].slice(0,10);cmdSel=0;
  $("#cmdRes").innerHTML=cmdList.length?cmdList.map((r,i)=>`<div class="r ${i===0?'sel':''}" data-i="${i}">
    ${ic(r.go?'grid':'layers')}<div><div>${r.t}</div><small>${r.s}</small></div><span class="k">↵</span></div>`).join('')
    :`<div style="padding:22px;text-align:center;color:var(--muted);font-size:13px">Aucun résultat</div>`;
  $$('#cmdRes .r').forEach(el=>{el.onclick=()=>cmdGo(+el.dataset.i);el.onmouseenter=()=>{cmdSel=+el.dataset.i;cmdHi();};});
}
function cmdHi(){$$('#cmdRes .r').forEach((e,i)=>e.classList.toggle('sel',i===cmdSel));}
function cmdGo(i){const r=cmdList[i];if(!r)return;closeCmd();
  if(r.go){go(r.go);}
  else{go('contenus');setTimeout(()=>{const s=$("#cSearch");if(s){s.value=r.titre;s.dispatchEvent(new Event('input'));}},300);}}

/* ---------- init ---------- */
function licenceBanner(){
  const L=(window.AWEMA_REGISTRY&&window.AWEMA_REGISTRY.licence)||{};
  if(L.statut==='active') return;
  const m=$("#main"); if(!m||document.getElementById('licBan')) return;
  const b=document.createElement('div'); b.id='licBan';
  b.style.cssText='margin:0 0 12px;padding:11px 15px;border-radius:12px;border:1px solid var(--border2);background:linear-gradient(120deg,rgba(255,200,97,.14),rgba(255,125,156,.10));font-size:13px;display:flex;gap:10px;align-items:center;flex-wrap:wrap';
  b.innerHTML='<span style="font-size:16px">🗝️</span><b>Instance non activée'+(L.statut==='revoquee'?' · licence révoquée':'')+'</b>'+
    '<span style="color:var(--muted)">— pour brancher officiellement les API de tes clients, active ton accès auprès d\'AWEMA.</span>';
  m.insertBefore(b, m.firstChild);
}
function boot(){
  licenceBanner();
  CLIENTS=(window.AWEMA_REGISTRY&&window.AWEMA_REGISTRY.clients)||[];
  if(!CLIENTS.length&&window.CAMPAGNE){CLIENTS=[{id:'client-standalone',nom:window.CAMPAGNE.client||'Client',
    lieu:window.CAMPAGNE.lieu||'',secteur:'',statut:'actif',profils:{},reseaux:null,
    campagne:{total:window.CAMPAGNE.total,contenus:window.CAMPAGNE.contenus}}];}
  $("#who").innerHTML=((window.AWEMA_CONFIG&&window.AWEMA_CONFIG.nom)||'AWEMA')+'<small>Directeur Marketing</small>';
  const sel=$("#clientSel");
  sel.innerHTML=CLIENTS.length?CLIENTS.map(c=>`<option value="${c.id}">${c.nom}</option>`).join(''):'<option>— aucun client —</option>';
  let saved=null;try{saved=localStorage.getItem('awema-client');}catch(e){}
  const qp=new URLSearchParams(location.search).get('client');
  const init=CLIENTS.find(c=>c.id===qp)||CLIENTS.find(c=>c.id===saved)||CLIENTS[0];
  skeleton();
  if(!init){$("#psub").textContent='Aucun client';
    setTimeout(()=>{$("#grid").innerHTML='';add(`<h3>${ic('users')} Aucun client</h3><div class="sub">Registre vide</div>
      <div style="margin-top:12px;color:var(--muted);font-size:12.5px">Ajoutez un client (voir <code>outils/_data/README.md</code>) puis régénérez le registre.</div>`,'col12');},300);return;}
  sel.value=init.id;
  majFraicheur();
  // Deep-link ?section=publier|memoire|reseaux… (utilisé par la redirection planifier.html)
  const sec=new URLSearchParams(location.search).get('section');
  if(sec&&SECTIONS[sec])CURRENT=sec;
  setTimeout(()=>setClient(init.id),400);
}
// events
$("#themeBtn").onclick=()=>{const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');$("#themeBtn").innerHTML=ic(d?'sun':'moon');toast(d?'Thème clair':'Thème sombre');};
$("#hamb").onclick=e=>{e.stopPropagation();$("#side").classList.toggle('open');};
$("#main").addEventListener('click',e=>{if(e.target.closest('#hamb'))return;$("#side").classList.remove('open');});
$("#cmdkBtn").onclick=openCmd;
$("#newBtn").onclick=()=>go('publier',{focus:'#pubTexte'});
$("#cmdIn").oninput=e=>cmdRender(e.target.value);
$("#cmdOv").onclick=e=>{if(e.target===$("#cmdOv"))closeCmd();};
$$('#nav a').forEach(a=>a.onclick=()=>go(a.dataset.go));
$("#clientSel").onchange=e=>setClient(e.target.value);
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCmd();}
  if(e.key==='Escape')closeCmd();
  if($("#cmdOv").classList.contains('on')){
    if(e.key==='ArrowDown'){e.preventDefault();cmdSel=Math.min(cmdSel+1,cmdList.length-1);cmdHi();}
    if(e.key==='ArrowUp'){e.preventDefault();cmdSel=Math.max(cmdSel-1,0);cmdHi();}
    if(e.key==='Enter')cmdGo(cmdSel);
  }
});
boot();
</script>
<script src="../_design/abeille.js" data-aide="dashboard"></script>
